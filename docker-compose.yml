services:

  # ── PostgreSQL database ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: investiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB      : investiq
      POSTGRES_USER    : investiq_user
      POSTGRES_PASSWORD: investiq123
    volumes:
      # Persist data across container restarts
      # Without this volume, data is lost when container stops
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test    : ["CMD-SHELL", "pg_isready -U investiq_user -d investiq"]
      interval: 10s
      timeout : 5s
      retries : 5

  # ── Redis cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: investiq_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    # maxmemory-policy allkeys-lru: evict least recently used keys
    # when memory limit is reached — correct policy for a cache
    ports:
      - "6379:6379"
    healthcheck:
      test    : ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout : 5s
      retries : 5

  # ── FastAPI backend ─────────────────────────────────────────────
  backend:
    build:
      context   : .
      dockerfile: Dockerfile
    container_name: investiq_backend
    restart: unless-stopped
    environment:
      # Database — uses service name "postgres" as host
      # Docker networking resolves service names automatically
      DB_HOST    : postgres
      DB_PORT    : "5432"
      DB_NAME    : investiq
      DB_USER    : investiq_user
      DB_PASSWORD: investiq123
      # Redis
      REDIS_HOST : redis
      REDIS_PORT : "6379"
      REDIS_URL  : redis://redis:6379/0
      # API keys — loaded from .env
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      NEWS_API_KEY: "${NEWS_API_KEY}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount models directory so trained models persist
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test    : ["CMD", "python", "-c",
                 "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout : 10s
      retries : 3

  # ── React frontend ──────────────────────────────────────────────
  frontend:
    build:
      context   : ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the backend URL at build time
        # In production this becomes your Railway URL
        REACT_APP_API_URL: http://localhost:8000
    container_name: investiq_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Celery worker ───────────────────────────────────────────────
  celery_worker:
    build:
      context   : .
      dockerfile: Dockerfile
    container_name: investiq_celery
    restart: unless-stopped
    command: celery -A src.api.tasks worker --loglevel=info
    environment:
      DB_HOST    : postgres
      DB_PORT    : "5432"
      DB_NAME    : investiq
      DB_USER    : investiq_user
      DB_PASSWORD: investiq123
      REDIS_URL  : redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY  : ${NEWS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  # ── Celery beat scheduler ───────────────────────────────────────
  celery_beat:
    build:
      context   : .
      dockerfile: Dockerfile
    container_name: investiq_beat
    restart: unless-stopped
    command: celery -A src.api.tasks beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker

# ── Named volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
    # This volume persists even when containers are deleted
    # Your database data survives docker-compose down